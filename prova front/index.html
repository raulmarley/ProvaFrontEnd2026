<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova Front-end</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
        }

        /* HEADER */
        .header {
            background-color: #1e3a5f;
            color: white;
            padding: 15px 30px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            gap: 25px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            flex: 1;
            min-width: 300px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #222;
        }

        .card p {
            font-size: 20px;
            margin-bottom: 20px;
            color: #555;
        }

        /* BOTÃO */
        .btn {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0b5ed7;
        }

        /* FORMULÁRIO */
        .form-area {
            text-align: center;
            margin-bottom: 50px;
        }

        .form-area input {
            padding: 12px;
            width: 280px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-right: 10px;
            font-size: 16px;
        }

        /* FOOTER */
        .footer {
            background-color: #1e3a5f;
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 18px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>Prova Front-end</h1>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main class="container">

        <section class="cards">

            <div class="card">
                <h2>Card 1</h2>
                <p>Conteúdo de exemplo para o card.</p>
                <button class="btn" onclick="clicar('Card 1')">Clique</button>
            </div>

            <div class="card">
                <h2>Card 2</h2>
                <p>Outro conteúdo de exemplo.</p>
                <button class="btn" onclick="clicar('Card 2')">Clique</button>
            </div>

            <div class="card">
                <h2>Card 3</h2>
                <p>Mais um exemplo de card.</p>
                <button class="btn" onclick="clicar('Card 3')">Clique</button>
            </div>

        </section>

        <div class="form-area">
            <input type="text" id="nome" placeholder="Digite seu nome">
            <button class="btn" onclick="enviar()">Enviar</button>
        </div>

    </main>

    <footer class="footer">
        <p>Professor: Heytor | Prova prática de Front-end</p>
    </footer>

    <script>
        function clicar(card) {
            alert("Você clicou no " + card);
        }

        function enviar() {
            const nome = document.getElementById("nome").value.trim();

            if (nome === "") {
                alert("Digite seu nome!");
            } else {
                alert("Olá, " + nome + "!");
            }
        }
    </script>

</body>
</html>
